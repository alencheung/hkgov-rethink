# hkgov-rethink default configuration.
# Override with env vars: HKGOV_ prefix + __ separator, e.g.
#   HKGOV_API__BIND=0.0.0.0:9090
#   HKGOV_AGENT__ENABLED=true

[api]
bind = "0.0.0.0:8080"
# Single-node v1 ceiling. Scale horizontally (docs/CAPACITY.md) for 100k.
max_concurrency = 50000
request_timeout_ms = 15000
# All API routes nest under this prefix (health stays at root for probes).
api_prefix = "/v1"
# Set HKGOV_API__API_KEY to require X-API-Key on every non-health request.
# V-002: the key is header-only (the ?api_key= query path was removed — it
# leaked into access logs / browser history / Referer).
api_key = ""
# Per-IP rate limit, req/s. 0 = unlimited. V-003: this is now wired to a
# tower-governor limiter on the router (previously dead config).
# IMPORTANT (PR-014): 0 is fine for local dev, but BEFORE exposing publicly you
# MUST set a sane non-zero value (e.g. 20) — otherwise there is zero protection
# against anonymous request floods. Defaulting to 0 keeps dev zero-config; it is
# not a safe production setting.
rate_per_sec = 0
# CORS allow-list. Empty (default) = same-origin only — no ACAO header. V-007:
# the router previously used CorsLayer::permissive() (ACAO: *). Add exact
# origins here if a browser client on another origin needs API access, e.g.
#   cors_origins = ["https://hkgov-rethink.example"]
cors_origins = []
# DEV ONLY. Returns the magic-link token in POST /v1/auth/request-token so
# local/CI flows can redeem it without an email sink. V-005: must be false in
# production — the token is a credential; returning it in the body meant anyone
# who could read the response (logs/MITM) could impersonate the email owner.
dev_return_auth_token = false

[upstream]
hkma_base_url = "https://api.hkma.gov.hk/public"
# Set HKGOV_UPSTREAM__HKMA_API_KEY if HKMA issues you a key for higher quota.
hkma_api_key = ""
hkma_timeout_ms = 10000
hkma_max_retries = 3
hkma_rate_per_sec = 5
data_gov_hk_filter_url = "https://api.data.gov.hk/v2/filter"
data_gov_hk_archive_url = "https://app.data.gov.hk/v1/historical-archive/list-files"

[cache]
max_entries = 200000
ttl_secs = 600

[store]
# memory (in-process moka) or redis (needs --features redis + a running server)
backend = "memory"
redis_url = "redis://127.0.0.1:6379"

[agent]
# Enable the AI-agent analysis scheduler. ON by default: heuristic mode needs no
# LLM key (detection is pure Rust), and the Silence Index — the dashboard's
# flagship number — is computed entirely from the insights this scheduler
# generates. With it off, insights and the Silence Index stay permanently empty.
# Set to false only to suppress background scanning.
enabled = true
run_interval_secs = 21600
# Leave empty for heuristic mode; set to an OpenAI-compatible base URL + build
# with --features llm to use the HTTP LLM client for richer insight framing.
llm_base_url = ""
# HKGOV_AGENT__LLM_API_KEY
llm_api_key = ""
llm_model = "gpt-4o-mini"
# What the periodic scan pass runs. OMITTING this block (or leaving it empty)
# runs the built-in defaults shown below — so you only need to edit this if you
# want to widen or change coverage.
#
# Each [[agent.scan]] entry is one detector invocation. Available detectors:
#   series_jump     — flags a numeric field that moved > threshold % between
#                     consecutive periods.      Needs: field, threshold (%).
#   outlier         — flags a point beyond `threshold` robust-z (MAD). Default
#                     threshold 3.5.            Needs: field.
#   seasonality     — flags strong autocorrelation at monthly (lag 12) or
#                     quarterly (lag 4) periods, above `threshold` (default 0.6).
#                                                Needs: field.
#   correlation     — flags when two fields DECOUPLE (|r| < threshold, default
#                     0.3).                      Needs: field, field_b.
#   cross_source_gap — flags dates present in this dataset but absent in
#                      `companion`.             Needs: field (the date column),
#                                                companion.
#   year_over_year  — flags period vs same-period-a-year-ago moves, removing
#                     seasonality. `threshold` is the % YoY watch (default 15).
#                     `cadence` sets periods/year (quarterly=4, monthly=12).
#                                                Needs: field, cadence.
#   proxy_divergence — THE hero detector for "non-obvious lies": flags when two
#                      proxies that should measure the same fact diverge in value
#                      (latest period) or decouple over history (Pearson r).
#                      `threshold` is the value-divergence % (default 5).
#                                                Needs: field, companion,
#                                                companion_field, [join_field].
#   benchmark_deviation — flags actual vs assumed/projected/peer value.
#                      `threshold` is the deviation % (default 10).
#                                                Needs: field, companion (the
#                                                benchmark dataset),
#                                                companion_field, [join_field].
#
# Uncomment to override the defaults:
# [[agent.scan]]
# source = "hkma"
# dataset = "daily-interbank-liquidity"
# detector = "series_jump"
# field = "hibor_overnight"
# threshold = 25.0
#
# [[agent.scan]]
# source = "hkma"
# dataset = "daily-interbank-liquidity"
# detector = "outlier"
# field = "hibor_overnight"
# threshold = 3.5
#
# [[agent.scan]]
# source = "hkma"
# dataset = "capital-market-statistics"
# detector = "correlation"
# field = "eq_mkt_hs_index"
# field_b = "eq_mkt_total_turnover"
# threshold = 0.3
# experimental = true   # validated by construction, not yet by a real finding
#
# [[agent.scan]]
# source = "hkma"
# dataset = "capital-market-statistics"
# detector = "seasonality"
# field = "eq_mkt_hs_index"
# experimental = true   # validated by construction, not yet by a real finding
#
# Year-over-year: compare each period to the same period a year ago. Use for
# seasonal quarterly/annual series where PoP is dominated by calendar effects.
# cadence sets periods-per-year (quarterly=4, monthly=12, annual=1).
# [[agent.scan]]
# source = "hkma"
# dataset = "capital-market-statistics"
# detector = "year_over_year"
# field = "eq_mkt_hs_index"
# threshold = 15.0
# cadence = "monthly"
#
# Proxy divergence (hero): two datasets measuring the same fact disagree.
# Example sketch — land revenue via fiscal receipts vs land transactions.
# [[agent.scan]]
# source = "hkma"
# dataset = "fiscal-receipts"
# detector = "proxy_divergence"
# field = "land_premium"
# companion = { source = "datagovhk", dataset = "land-transactions" }
# companion_field = "consideration"
# join_field = "quarter"
# threshold = 5.0
# experimental = true   # needs both datasets ingested to fire
#
# Benchmark deviation: actual vs assumed/projected. Example sketch — land
# premium receipts vs the budget speech assumption.
# [[agent.scan]]
# source = "hkma"
# dataset = "fiscal-receipts"
# detector = "benchmark_deviation"
# field = "land_premium_actual"
# companion = { source = "datagovhk", dataset = "budget-assumptions" }
# companion_field = "land_premium_assumed"
# join_field = "fiscal_year"
# threshold = 10.0
# experimental = true   # needs both datasets ingested to fire
#
# [[agent.scan]]
# source = "press"
# dataset = "hkma-press-releases"
# detector = "cross_source_gap"
# field = "date"
# companion = { source = "hkma", dataset = "daily-interbank-liquidity" }

[alerts]
# Proactive webhook alerting (v6). Push insights at or above min_severity to
# every webhook. Needs `--features alerts` for the webhook sink to actually
# POST; without the feature the dispatcher logs a warning instead.
enabled = false
# info | warning | critical. `warning` is the default so info-level insights
# don't spam. Insights are deduped by id — a re-scan that reproduces the same
# finding will NOT re-alert.
min_severity = "warning"
# Webhook URLs. Each qualifying insight is POSTed as:
#   { "event": "insight", "insight": { ...Insight... } }
# with Authorization: Bearer <webhook_token> when set.
webhooks = []
# HKGOV_ALERTS__WEBHOOK_TOKEN
webhook_token = ""

[log]
format = "plain"
filter = "info,hkgov=debug"

[reference]
# Curated "related market players" directory served from
# GET /v1/market-players and shown on the Licences page when a user browses a
# license-issuing department. OMITTING this block (or leaving it empty) ships
# the built-in defaults (the 7 departments with a clear private market). Set
# entries here only to override or extend.
#
# `dept` is a short stable code joining to the dashboard directory (HKMA, IA,
# SFC, OFCA, TD, TIA, FEHD). `category` is one of the domain slugs (monetary,
# fiscal, property, trade, population, livability, government, other).
#
# Uncomment to override the defaults:
# [[reference.market_player]]
# dept = "HKMA"
# category = "monetary"
# players = [
#   { name = "HSBC", note = "Largest HK bank, ~HK$10.5T assets" },
#   { name = "Bank of China (Hong Kong)", note = "#2 by assets, ~HK$3.9T" },
# ]
