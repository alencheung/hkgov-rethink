name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt-clippy-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build (default features)
        run: cargo build --workspace --release

      - name: Test (default features, hermetic — `live` off)
        run: cargo test --workspace

  # Feature-gated crates: compile-check each optional backend. These need no
  # external service to build (only to *run*), so they belong in CI.
  features:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: redis store
        run: cargo clippy -p hkgov-store --features redis --all-targets -- -D warnings
      - name: pg store
        run: cargo clippy -p hkgov-store --features pg --all-targets -- -D warnings
      - name: otel
        run: cargo clippy -p hkgov-common --features otel --all-targets -- -D warnings
      - name: llm (agent)
        run: cargo clippy -p hkgov-agent --features llm --all-targets -- -D warnings
